{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  {{ form.media }}
{% endblock %}

{% block content %}
  <p>Будет изменено записей: {{ queryset.count }}</p>

  <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    {% for obj in queryset %}
      <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
    {% endfor %}

    <input type="hidden" name="action" value="replace_lesson_related_fields">
    <input type="hidden" name="apply" value="1">

    <input type="submit" value="Заменить">
  </form>
{% endblock %}
